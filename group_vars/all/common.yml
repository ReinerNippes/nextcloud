---

#################################################################
# Do not edit this file. That will probably break the playbook. #
#################################################################

# This file is for variables that are common to all servers, but not specific to a role.
# For example, the password_file variable is used in multiple roles, so it makes sense to define it here instead of in each role's defaults/main.yml file.

# defaults path of your generated credentials (e.g. database, talk, onlyoffice)
# the directory must be writeable for the user running this playbook
password_file: "/opt/nextcloud/password_file.yml"

password_vars:
  - name: nextcloud_admin
    password: "{{ nextcloud_passwd | default('') }}"
  - name: database
    password: "{{ nextcloud_db.password | default('') }}"
  - name: restic_backup_secret
    password: "{{ restic_backup_secret | default('') }}"
  - name: redis
  - name: coturn
  - name: signal_nextcloud_secret
  - name: signal_internal_secret
  - name: signal_recording_secret
  - name: collabora_admin
  - name: hp_shared_key
  - name: onlyoffice_secret

# example of rclone config to backup to a s3 bucket

# rclone_remote: |
#      [backup-selfhosted]
#      type = s3
#      provider = AWS
#      env_auth = false
#      access_key_id = AKIxxxxx
#      secret_access_key = QMpoxxxx
#      region = us-east-1
#      acl = private
#      server_side_encryption = AES256
#      storage_class = STANDARD_IA

systemd_service_path:
  RedHat: '/usr/lib/systemd/system'
  Debian: '/lib/systemd/system'
  Suse: '/usr/lib/systemd/system'

# Port OnlyOffice listens on.
# Use 8443 when collocated with Nextcloud (port 443 is taken by the web server).
# Use 443 when OnlyOffice runs on a dedicated server (override in inventory/group_vars).
onlyoffice_ssl_port: >-
  {{
    ((groups['onlyoffice'] | default([]) | first | default(''))
    ==
    (groups['nextcloud'] | default([]) | first | default('')))
    | ternary(8443, 443)
  }}

# Port coturn listens on for TURN/TLS.
# Use coturn default 5349 when collocated with Nextcloud (port 443 is taken by the web server).
# Use 443 when coturn runs on a dedicated server.
# Can be overridden in inventory/group_vars.
coturn_tls_port: >-
  {{
    ((groups['coturn'] | default([]) | first | default(''))
    ==
    (groups['nextcloud'] | default([]) | first | default('')))
    | ternary(5349, 443)
  }}

coturn_user:
  RedHat: coturn
  Debian: turnserver
  Suse: coturn

coturn_conf_path:
  RedHat: /etc/coturn/turnserver.conf
  Debian: /etc/turnserver.conf
  Suse: /etc/coturn/turnserver.conf

# OS-dependent certificate directories
_tls_certificate_directory_map:
  RedHat: "/etc/pki/tls/private"
  Debian: "/etc/ssl/private"
  Suse: "/etc/ssl/private"

tls_certificate_directory: "{{ _tls_certificate_directory_map[ansible_facts['os_family']] }}"

tls_certificate_group: "ssl-cert"

tls_service_map:
  webserver: "{{ webserver_service_name[nextcloud_webserver_type][ansible_facts['os_family']] }}"
  coturn: "coturn.service"
  redis: "{{ redis_systemd_unit[ansible_facts['os_family']] }}"
  database: "{{ (nextcloud_db.type == 'mysql') | ternary('mariadb', postgresql_daemon_service_name) }}.service"

tls_certificate_owner: "root"

tls_certificate_common_name: "{{ inventory_hostname }}"
tls_certificate_key_length: "ec-256"

# Certificate file paths
tls_certificate_file: "{{ tls_certificate_directory }}/{{ tls_certificate_common_name }}_ecc/{{ tls_certificate_common_name }}.cer"
tls_certificate_key: "{{ tls_certificate_directory }}/{{ tls_certificate_common_name }}_ecc/{{ tls_certificate_common_name }}.key"
tls_certificate_fullchain: "{{ tls_certificate_directory }}/{{ tls_certificate_common_name }}_ecc/fullchain.cer"
tls_certificate_csr: "{{ tls_certificate_directory }}/{{ tls_certificate_common_name }}_ecc/{{ tls_certificate_common_name }}.csr"
tls_certificate_ca: "{{ tls_certificate_directory }}/{{ tls_certificate_common_name }}_ecc/ca.cer"

tls_certificate_test: "{{ tls_certificate.acme_ca | default('') is regex('test$') }}"
