---
# Dedicated Nextcloud Office (Collabora) — runs on its own server.
# Collabora uses its default self-signed SSL on port 9980.
# A local nginx reverse proxy terminates the real TLS cert on port 443
# and forwards to https://127.0.0.1:9980.

- name: Add nextcloudoffice service to compose.yml
  ansible.builtin.blockinfile:
    path: /opt/nextcloud/docker_compose/compose.yml
    marker: "# {mark} nextcloudoffice service"
    block: |
      #
        nextcloudoffice:
          image: collabora/code:latest
          container_name: nextcloudoffice
          restart: unless-stopped
          networks:
            - nextcloud
          ports:
            - "127.0.0.1:9980:9980"
          volumes:
            - /usr/share/fonts/truetype/:/opt/collaboraoffice/share/fonts/truetype/local/:ro
          environment:
            aliasgroup1: 'https://{{ nextcloud_fqdn }}:443,https://{{ nextcloud_fqdn.split('.') | join('\\.') }}'
            username: "admin"
            password: "{{ passwords.collabora_admin }}"
            lang: "de_DE"
            dictionaries: "de_DE en_GB en_US"
            extra_params: "--o:home_mode.enable=true"
          user: "1001:1001"
          mem_limit: 4g
          labels:
            com.centurylinklabs.watchtower.enable: "true"

- name: Deploy nginx reverse proxy for nextcloudoffice
  ansible.builtin.template:
    src: nextcloudoffice-dedicated-nginx.conf.j2
    dest: /etc/nginx/conf.d/nextcloudoffice.conf
    mode: "0644"
  notify: restart web services
