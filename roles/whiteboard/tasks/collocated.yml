---
# Collocated Whiteboard — runs on the same host as Nextcloud.
# WebSocket server listens on localhost:3002, proxied by the Nextcloud webserver.

- name: Add whiteboard service to compose.yml
  ansible.builtin.blockinfile:
    path: /opt/nextcloud/docker_compose/compose.yml
    marker: "# {mark} whiteboard service"
    block: |
      #
        whiteboard:
          image: ghcr.io/nextcloud-releases/whiteboard:stable
          container_name: whiteboard
          restart: unless-stopped
          networks:
            - nextcloud
          ports:
            - "127.0.0.1:3002:3002"
          environment:
            NEXTCLOUD_URL: "https://{{ nextcloud_fqdn }}"
            JWT_SECRET_KEY: "{{ passwords.whiteboard_secret }}"
            MAX_UPLOAD_FILE_SIZE: "{{ whiteboard_max_upload_file_size }}"
          extra_hosts:
            - "{{ nextcloud_fqdn }}:{{ docker_network_nextcloud.network.IPAM.Config[0].Gateway }}"
          labels:
            com.centurylinklabs.watchtower.enable: "true"
