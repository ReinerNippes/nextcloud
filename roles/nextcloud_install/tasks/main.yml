---
# tasks file for nextcloud_install
# Download, first setup, core configuration

- name: Download nextcloud archive
  ansible.builtin.get_url:
    url: "{{ nextcloud_archive }}"
    dest: /tmp/nextcloud.tar.bz2
    mode: "0644"
    checksum: "sha256:{{ nextcloud_archive }}.sha256"

- name: Install nextcloud
  ansible.builtin.unarchive:
    src: /tmp/nextcloud.tar.bz2
    dest: /var/www
    remote_src: true
    owner: "{{ web_user[nextcloud_webserver_type][ansible_facts['os_family']] }}"
    group: "{{ web_group[nextcloud_webserver_type][ansible_facts['os_family']] }}"
    mode: "o-rwx"
    creates: "{{ nextcloud_www_dir }}/occ"

- name: Flush all handlers to restart server
  ansible.builtin.meta: flush_handlers

- name: Configure nextcloud
  ansible.builtin.include_tasks: configure/nextcloud.yml

- name: Configure mail
  ansible.builtin.include_tasks: configure/mail.yml

- name: Configure logging
  ansible.builtin.include_tasks: configure/logging.yml

- name: Configure preview providers
  ansible.builtin.include_tasks: configure/preview.yml

- name: Add nextcloud cronjob
  ansible.builtin.cron:
    name: nextcloud cronjob
    minute: '*/5'
    user: "{{ web_user[nextcloud_webserver_type][ansible_facts['os_family']] }}"
    job: "php -f {{ nextcloud_www_dir }}/cron.php > /dev/null 2>&1"

- name: Run nextcloud cronjob
  become_user: "{{ web_user[nextcloud_webserver_type][ansible_facts['os_family']] }}"
  become_flags: "{{ ansible_become_flags | default(omit) }}"
  become: true
  ansible.builtin.command: php -f {{ nextcloud_www_dir }}/cron.php
  args:
    chdir: "{{ nextcloud_www_dir }}"
  when: first_setup_nextcloud is changed
