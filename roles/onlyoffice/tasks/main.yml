---
# tasks file for onlyoffice installation

- name: Create onlyoffice data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    # mode: "0755"
  loop:
    - /opt/onlyoffice/DocumentServer/data
    - /opt/onlyoffice/DocumentServer/logs
    - /opt/onlyoffice/DocumentServer/lib
    - /opt/onlyoffice/DocumentServer/db

- name: Add onlyoffice service to compose.yml
  ansible.builtin.blockinfile:
    path: /opt/nextcloud/docker_compose/compose.yml
    marker: "# {mark} onlyoffice service"
    block: |
      #
        onlyoffice:
          image: onlyoffice/documentserver:latest
          container_name: onlyoffice
          restart: unless-stopped
          networks:
            - nextcloud
          ports:
            - "{{ onlyoffice_ssl_port }}:443"
          environment:
            ONLYOFFICE_HTTPS_HSTS_ENABLED: "{% if (tls_certificate.type == 'selfsigned') or tls_certificate_test %}false{% else %}true{% endif %}"
            USE_UNAUTHORIZED_STORAGE: "{% if (tls_certificate.type == 'selfsigned') or tls_certificate_test %}true{% else %}false{% endif %}"
            JWT_ENABLED: "true"
            JWT_SECRET: "{{ passwords.onlyoffice_secret }}"
          volumes:
            - "{{ tls_certificate_key }}:/var/www/onlyoffice/Data/certs/onlyoffice.key:ro"
            - "{{ tls_certificate_fullchain }}:/var/www/onlyoffice/Data/certs/onlyoffice.crt:ro"
            - "{{ tls_certificate_fullchain }}:/var/www/onlyoffice/Data/certs/ca-certificates.pem:ro"
            - "{{ tls_certificate_directory }}/dhparam.pem:/var/www/onlyoffice/Data/certs/dhparam.pem:ro"
            - /opt/onlyoffice/DocumentServer/data:/var/www/onlyoffice/Data
            - /opt/onlyoffice/DocumentServer/logs:/var/log/onlyoffice
            - /opt/onlyoffice/DocumentServer/lib:/var/lib/onlyoffice
            - /opt/onlyoffice/DocumentServer/db:/var/lib/postgresql
          labels:
            com.centurylinklabs.watchtower.enable: "true"
