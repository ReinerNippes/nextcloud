---
# tasks file for prep_talk

- name: Get my public ip
  community.general.ipify_facts:
  register: external_ip

- name: Include os specific tasks
  ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] }}.yml"

- name: Configure coturn logrotate
  ansible.builtin.template:
    src: coturn.logrotate.j2
    dest: "/etc/logrotate.d/coturn"
    owner: root
    group: root
    mode: "0644"
    force: true

- name: Ensure coturn log directory exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ 'coturn' if ansible_facts['os_family'] == 'RedHat' else 'turnserver' }}"
    group: "{{ 'coturn' if ansible_facts['os_family'] == 'RedHat' else 'turnserver' }}"
    mode: "0755"
  loop:
    - "/var/log/coturn"
    - "/run/coturn"
  notify: restart coturn

- name: Configure coturn in /etc/turnserver.conf
  ansible.builtin.template:
    src: turnserver.conf.j2
    dest: /etc/{{ 'coturn/' if ansible_facts['os_family'] == 'RedHat' else '' }}turnserver.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart coturn

- name: Ensure coturn systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/coturn.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  notify: restart coturn

- name: Configure coturn systemd service override
  ansible.builtin.template:
    src: coturn.systemd.override.j2
    dest: /etc/systemd/system/coturn.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart coturn

- name: Enable and start coturn service
  ansible.builtin.systemd:
    name: coturn
    state: started
    enabled: true
    daemon_reload: true

- name: Run coturn handler
  ansible.builtin.meta: flush_handlers

- name: Wait for coturn TLS listener socket
  ansible.builtin.command: "ss -ltn sport = :{{ coturn_tls_port }}"
  register: coturn_tls_socket
  changed_when: false
  retries: 30
  delay: 1
  until: coturn_tls_socket.stdout is search('LISTEN')
