---
# apt related OS tasks

- name: Install needed php packages
  ansible.builtin.apt:
    name: "{{ php_package_required[ansible_facts['pkg_mgr']] }}"
    state: latest

- name: Install optional php packages
  ansible.builtin.apt:
    name: "{{ php_package_optional[ansible_facts['pkg_mgr']] }}"
    state: latest
  when: php_install_optional_packages|bool

- name: Configure php postgres module
  ansible.builtin.copy:
    dest: /etc/php/{{ php_version }}/mods-available/pgsql.ini
    content: |
      # configuration for PHP PostgreSQL module
      extension=pgsql.so

      [PostgresSQL]
      pgsql.allow_persistent = On
      pgsql.auto_reset_persistent = Off
      pgsql.max_persistent = -1
      pgsql.max_links = -1
      pgsql.ignore_notice = 0
      pgsql.log_notice = 0
    owner: root
    group: root
    mode: "0644"
    backup: true
  when: nextcloud_db.type == 'pgsql'
  notify: restart web services

- name: Configure php mysql module
  ansible.builtin.copy:
    dest: /etc/php/{{ php_version }}/mods-available/pdo_mysql.ini
    content: |
      # configuration for PHP MySQL module
      extension=pdo_mysql.so

      [mysql]
      mysql.allow_local_infile=On
      mysql.allow_persistent=On
      mysql.cache_size=2000
      mysql.max_persistent=-1
      mysql.max_links=-1
      mysql.default_port=
      mysql.default_socket=/var/lib/mysql/mysql.sock
      mysql.default_host=
      mysql.default_user=
      mysql.default_password=
      mysql.connect_timeout=60
      mysql.trace_mode=Off
    owner: root
    group: root
    mode: "0644"
    backup: true
  when: nextcloud_db.type == 'mysql'
  notify: restart web services
