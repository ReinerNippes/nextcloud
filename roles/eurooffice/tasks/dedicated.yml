---
# Dedicated Euro-Office — runs on its own server.
# Euro-Office listens on HTTP port 80 internally.
# A local nginx reverse proxy terminates the real TLS cert on port 443
# and forwards to http://127.0.0.1:8444.

- name: Add euro-office service to compose.yml
  ansible.builtin.blockinfile:
    path: /opt/nextcloud/docker_compose/compose.yml
    marker: "# {mark} eurooffice service"
    block: |
      #
        eurooffice:
          image: ghcr.io/euro-office/documentserver:latest
          container_name: eurooffice
          restart: unless-stopped
          networks:
            - nextcloud
          ports:
            - "127.0.0.1:8443:80"
          environment:
            EXAMPLE_ENABLED: "true"
            JWT_SECRET: "{{ passwords.eurooffice_secret }}"
          # volumes:
          #   - /opt/eurooffice/DocumentServer/data:/var/www/onlyoffice/Data
          #   - /opt/eurooffice/DocumentServer/logs:/var/log/onlyoffice
          #   - /opt/eurooffice/DocumentServer/lib:/var/lib/onlyoffice
          #   - /opt/eurooffice/DocumentServer/db:/var/lib/postgresql
          labels:
            com.centurylinklabs.watchtower.enable: "true"

- name: Deploy nginx reverse proxy for euro-office
  ansible.builtin.template:
    src: eurooffice-dedicated-nginx.conf.j2
    dest: /etc/nginx/conf.d/eurooffice.conf
    mode: "0644"
  notify: restart web services
